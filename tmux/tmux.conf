# tmux Configuration — Ghostty (Linux & macOS)
# Install: ln -sf ~/.config/ghostty/tmux/tmux.conf ~/.tmux.conf

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,ghostty:RGB"

# Mouse support
set -g mouse on

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase history
set -g history-limit 50000

# Reduce escape time (for neovim)
set -sg escape-time 10

# Focus events (for neovim autoread)
set -g focus-events on

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Quick window switching (Alt+number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Vi copy mode with platform clipboard
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'"

# Status bar — Tokyo Night inspired
set -g status-position bottom
set -g status-interval 1
set -g status-style 'bg=#1a1b26 fg=#a9b1d6'

set -g status-left-length 50
set -g status-left '#[fg=#7aa2f7,bold] #S #[fg=#565f89]|'

set -g status-right-length 100
set -g status-right '#[fg=#565f89]| #[fg=#9ece6a]%H:%M #[fg=#565f89]| #[fg=#bb9af7]%d-%b'

setw -g window-status-format '#[fg=#565f89] #I:#W '
setw -g window-status-current-format '#[fg=#7aa2f7,bold] #I:#W '

# Pane borders
set -g pane-border-style 'fg=#565f89'
set -g pane-active-border-style 'fg=#7aa2f7'

# Message style
set -g message-style 'bg=#1a1b26 fg=#7aa2f7 bold'
