# Keyboard Bindings — macOS
# Modifier: cmd (standard macOS convention)

# Clipboard (macOS defaults, included for completeness)
keybind = cmd+c=copy_to_clipboard
keybind = cmd+v=paste_from_clipboard

# Font size
keybind = cmd+equal=increase_font_size:1
keybind = cmd+minus=decrease_font_size:1
keybind = cmd+0=reset_font_size

# Navigation
keybind = cmd+k=clear_screen
keybind = cmd+t=new_tab
keybind = cmd+w=close_surface

# Split management
keybind = cmd+d=new_split:right
keybind = cmd+shift+d=new_split:down
keybind = cmd+shift+z=toggle_split_zoom

# Split navigation
keybind = cmd+alt+arrow_left=goto_split:left
keybind = cmd+alt+arrow_right=goto_split:right
keybind = cmd+alt+arrow_up=goto_split:up
keybind = cmd+alt+arrow_down=goto_split:down

# Split resize
keybind = cmd+ctrl+arrow_down=resize_split:down,100
keybind = cmd+ctrl+arrow_up=resize_split:up,100
keybind = cmd+ctrl+arrow_left=resize_split:left,100
keybind = cmd+ctrl+arrow_right=resize_split:right,100

# Tab navigation
keybind = cmd+1=goto_tab:1
keybind = cmd+2=goto_tab:2
keybind = cmd+3=goto_tab:3
keybind = cmd+4=goto_tab:4
keybind = cmd+5=goto_tab:5
keybind = cmd+6=goto_tab:6
keybind = cmd+7=goto_tab:7
keybind = cmd+8=goto_tab:8
keybind = cmd+9=goto_tab:9

# Quick tab cycling
keybind = cmd+shift+left_bracket=previous_tab
keybind = cmd+shift+right_bracket=next_tab

# Global quick terminal (toggle from anywhere)
keybind = global:cmd+grave=toggle_quick_terminal
