# ==============================================
# MONASPACE NEON FONT CONFIGURATION
# ==============================================
# Characteristics: GitHub's modern font with texture healing, excellent ligatures
# Best for: Modern development, clean aesthetic, futuristic coding
# Source: https://monaspace.githubnext.com/

# Font Configuration
font-family = "MonaspiceNe Nerd Font Mono"
font-size = 13
font-thicken = true

# Enable all Monaspace stylistic sets for texture healing and ligatures
# ss01-ss08: Various ligature styles and texture healing features
font-feature = +calt,+liga,+ss01,+ss02,+ss03,+ss04,+ss05,+ss06,+ss07,+ss08

# Visual settings optimized for Monaspace
minimum-contrast = 1.15
cursor-style = bar
cursor-opacity = 0.95

# Window settings that complement Monaspace's modern design
window-padding-x = 14
window-padding-y = 10

# AI NOTES FOR MONASPACE NEON:
# - TEXTURE HEALING is the killer feature - makes monospace look proportional
# - Neon variant is the most modern/clean of the 5 Monaspace families
# - ss01-ss08 enable all stylistic alternates (ligatures, arrows, etc.)
# - font-thicken = true improves readability on retina displays
# - Size 13-14 is optimal for the font's design
# - Works beautifully with Tokyo Night, Catppuccin themes
# - Perfect for React/TypeScript, modern JavaScript
# - Other variants: Argon (humanist), Krypton (mechanical),
#   Radon (handwriting), Xenon (slab serif)
